<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>個人記帳</title>
<meta name="theme-color" content="#0F6E56" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="app-header">
  <h1>個人記帳</h1>
  <div class="header-actions">
    <span id="offline-badge" class="badge" style="display:none;">離線模式</span>
    <button type="button" id="logout-btn" class="logout-btn" style="display:none;">登出</button>
  </div>
</header>

<!-- 登入/註冊 -->
<section id="screen-auth" class="auth-screen">
  <p class="section-title">登入個人記帳</p>
  <label>Email</label>
  <input type="email" id="auth-email" placeholder="you@example.com" />

  <label>密碼</label>
  <input type="password" id="auth-password" placeholder="至少6碼" />

  <p class="auth-error" id="auth-error" style="display:none;"></p>

  <button type="button" id="auth-login-btn" class="primary-btn">登入</button>
  <button type="button" id="auth-signup-btn" class="ghost-btn-full">還沒有帳號？註冊新帳號</button>
  <button type="button" id="auth-forgot-btn" class="ghost-btn-full">忘記密碼？</button>
</section>

<!-- 重設密碼 -->
<section id="screen-reset-password" class="auth-screen" style="display:none;">
  <p class="section-title">設定新密碼</p>
  <label>新密碼</label>
  <input type="password" id="reset-new-password" placeholder="至少6碼" />

  <p class="auth-error" id="reset-error" style="display:none;"></p>

  <button type="button" id="reset-submit-btn" class="primary-btn">更新密碼</button>
</section>

<main class="app-main" id="app-shell" style="display:none;">

  <!-- 總覽 -->
  <section id="screen-overview" class="screen active">
    <p class="month-label" id="month-label"></p>
    <div class="summary-grid">
      <div class="summary-card">
        <p class="summary-label">支出</p>
        <p class="summary-value expense" id="sum-expense">$0</p>
      </div>
      <div class="summary-card">
        <p class="summary-label">收入</p>
        <p class="summary-value income" id="sum-income">$0</p>
      </div>
      <div class="summary-card">
        <p class="summary-label">結餘</p>
        <p class="summary-value" id="sum-balance">$0</p>
      </div>
    </div>
    <p class="section-title">近期交易</p>
    <div id="overview-list" class="tx-list"></div>
    <p class="empty-hint" id="overview-empty" style="display:none;">還沒有任何紀錄，點下方「新增」開始記帳。</p>
  </section>

  <!-- 交易列表 -->
  <section id="screen-list" class="screen">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜尋備註、分類..." />
    </div>

    <button type="button" id="toggle-advanced-filter" class="ghost-btn-full">進階篩選 ▾</button>

    <div id="advanced-filter-panel" class="advanced-filter-panel" style="display:none;">
      <p class="filter-group-label">帳戶（可複選）</p>
      <div id="filter-account-chips" class="chip-group"></div>

      <p class="filter-group-label">分類（可複選）</p>
      <div id="filter-category-chips" class="chip-group"></div>

      <p class="filter-group-label">金額範圍</p>
      <div class="amount-range-row">
        <input type="number" id="filter-amount-min" placeholder="最低" />
        <span>～</span>
        <input type="number" id="filter-amount-max" placeholder="最高" />
      </div>

      <button type="button" id="filter-clear-btn" class="ghost-btn-full">清除篩選</button>

      <p class="filter-group-label" style="margin-top:16px;">儲存這組篩選</p>
      <div class="inline-row">
        <input type="text" id="filter-preset-name" placeholder="篩選名稱（例如：週末外食）" />
        <button type="button" id="filter-save-preset-btn" class="primary-btn small">儲存</button>
      </div>
      <div id="filter-preset-list" class="chip-group"></div>
    </div>

    <div id="full-list" class="tx-list"></div>
    <p class="empty-hint" id="list-empty" style="display:none;">找不到符合的紀錄。</p>
  </section>

  <!-- 新增交易 -->
  <section id="screen-add" class="screen">
    <form id="tx-form">
      <div class="type-toggle">
        <button type="button" id="btn-expense" class="type-btn active expense-btn">支出</button>
        <button type="button" id="btn-income" class="type-btn income-btn">收入</button>
        <button type="button" id="btn-transfer" class="type-btn transfer-btn">轉帳</button>
      </div>
      <label>金額</label>
      <div class="amount-display" id="tx-amount-display">0</div>
      <input type="hidden" id="tx-amount" value="0" />
      <div class="calc-keypad">
        <div class="calc-row">
          <button type="button" class="calc-btn calc-ac" data-key="AC">AC</button>
          <button type="button" class="calc-btn calc-del" data-key="DEL">DEL</button>
          <button type="button" class="calc-btn calc-eq" data-key="=">=</button>
        </div>
        <div class="calc-row">
          <button type="button" class="calc-btn" data-key="7">7</button>
          <button type="button" class="calc-btn" data-key="8">8</button>
          <button type="button" class="calc-btn" data-key="9">9</button>
          <button type="button" class="calc-btn calc-op" data-key="/">÷</button>
        </div>
        <div class="calc-row">
          <button type="button" class="calc-btn" data-key="4">4</button>
          <button type="button" class="calc-btn" data-key="5">5</button>
          <button type="button" class="calc-btn" data-key="6">6</button>
          <button type="button" class="calc-btn calc-op" data-key="*">×</button>
        </div>
        <div class="calc-row">
          <button type="button" class="calc-btn" data-key="1">1</button>
          <button type="button" class="calc-btn" data-key="2">2</button>
          <button type="button" class="calc-btn" data-key="3">3</button>
          <button type="button" class="calc-btn calc-op" data-key="-">－</button>
        </div>
        <div class="calc-row">
          <button type="button" class="calc-btn calc-zero" data-key="0">0</button>
          <button type="button" class="calc-btn" data-key=".">．</button>
          <button type="button" class="calc-btn calc-op" data-key="+">＋</button>
        </div>
      </div>

      <div id="tx-category-row">
        <label>分類</label>
        <div class="inline-row">
          <select id="tx-category" required></select>
          <button type="button" id="btn-quick-add-cat" class="ghost-btn" title="新增分類"><i class="icon">＋</i></button>
        </div>
      </div>

      <label id="tx-account-label">帳戶</label>
      <select id="tx-account" required></select>

      <div id="transfer-to-row" style="display:none;">
        <label>轉入帳戶</label>
        <select id="tx-transfer-to"></select>
      </div>

      <div id="tx-merchant-row">
        <label>商家（選填）</label>
        <div class="inline-row">
          <select id="tx-merchant"><option value="">不指定</option></select>
          <button type="button" id="btn-quick-add-merchant" class="ghost-btn" title="新增商家"><i class="icon">＋</i></button>
        </div>
      </div>

      <label>日期</label>
      <input type="date" id="tx-date" required />

      <label>備註</label>
      <textarea id="tx-note" rows="2" placeholder="選填"></textarea>

      <button type="submit" class="primary-btn">儲存</button>
    </form>
  </section>

  <!-- 帳戶管理 -->
  <section id="screen-accounts" class="screen">
    <p class="section-title">帳戶</p>
    <div id="account-list" class="account-list"></div>

    <p class="section-title" style="margin-top:20px;">新增帳戶</p>
    <form id="account-form">
      <label>名稱</label>
      <input type="text" id="acc-name" placeholder="例如：中信信用卡" required />

      <label>類型</label>
      <select id="acc-type">
        <option value="cash">現金</option>
        <option value="bank">銀行帳戶</option>
        <option value="credit_card">信用卡</option>
        <option value="other">其他</option>
      </select>

      <label>期初餘額</label>
      <input type="number" id="acc-initial" placeholder="0" step="1" />

      <button type="submit" class="primary-btn" id="account-form-submit">新增帳戶</button>
      <button type="button" class="ghost-btn-full" id="account-form-cancel" style="display:none;">取消編輯</button>
    </form>
  </section>

  <!-- 分類管理 -->
  <section id="screen-categories" class="screen">
    <p class="section-title">支出分類</p>
    <p class="hint-text">長按項目可修改或刪除</p>
    <div id="expense-cat-list" class="cat-list"></div>
    <div class="add-cat-row">
      <input type="text" id="new-expense-cat" placeholder="新增支出分類名稱" />
      <button type="button" class="primary-btn small" data-type="expense" id="add-expense-cat-btn">新增</button>
    </div>

    <p class="section-title" style="margin-top:20px;">收入分類</p>
    <div id="income-cat-list" class="cat-list"></div>
    <div class="add-cat-row">
      <input type="text" id="new-income-cat" placeholder="新增收入分類名稱" />
      <button type="button" class="primary-btn small" data-type="income" id="add-income-cat-btn">新增</button>
    </div>

    <p class="section-title" style="margin-top:20px;">商家</p>
    <div id="merchant-list" class="cat-list"></div>
    <div class="add-cat-row">
      <input type="text" id="new-merchant" placeholder="新增商家名稱（例如：全聯、星巴克）" />
      <button type="button" class="primary-btn small" id="add-merchant-btn">新增</button>
    </div>
  </section>

</main>

<div id="action-sheet-overlay" class="action-sheet-overlay" style="display:none;">
  <div class="action-sheet">
    <p id="action-sheet-title" class="action-sheet-title"></p>
    <button type="button" id="action-sheet-edit" class="action-sheet-btn">編輯</button>
    <button type="button" id="action-sheet-delete" class="action-sheet-btn delete">刪除</button>
    <button type="button" id="action-sheet-cancel" class="action-sheet-btn cancel">取消</button>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav" style="display:none;">
  <button class="nav-btn active" data-tab="overview"><i class="icon">⌂</i><span>總覽</span></button>
  <button class="nav-btn" data-tab="accounts"><i class="icon">$</i><span>帳戶</span></button>
  <button class="nav-btn" data-tab="list"><i class="icon">≡</i><span>列表</span></button>
  <button class="nav-btn" data-tab="add"><i class="icon">＋</i><span>新增</span></button>
  <button class="nav-btn" data-tab="categories"><i class="icon">⚙</i><span>管理</span></button>
</nav>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="app.js"></script>
</body>
</html>
